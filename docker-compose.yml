services:
  postgres:
    image: postgres:16
    container_name: nikai-postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nikai

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: nikai-backend

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nikai

    depends_on:
      - postgres

volumes:
  postgres_data:
